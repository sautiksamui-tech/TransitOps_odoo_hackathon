<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nominatim API Test</title>

<style>
body{
    font-family: Arial;
    max-width:700px;
    margin:40px auto;
}

input{
    width:100%;
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 20px;
    margin-top:10px;
    cursor:pointer;
}

.result{
    border:1px solid #ddd;
    padding:10px;
    margin-top:10px;
    cursor:pointer;
}

.result:hover{
    background:#f2f2f2;
}
</style>

</head>

<body>

<h2>OpenStreetMap Nominatim Test</h2>

<input
id="search"
type="text"
placeholder="Type an address..."
>

<button onclick="getCurrentLocation()">
Use Current Location
</button>

<div id="results"></div>

<script>

const searchBox=document.getElementById("search");
const results=document.getElementById("results");

let timeout;

searchBox.addEventListener("input",()=>{

    clearTimeout(timeout);

    timeout=setTimeout(searchAddress,500);

});

async function searchAddress(){

    const query=searchBox.value;

    if(query.length<3){

        results.innerHTML="";
        return;

    }

    const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=jsonv2&limit=5`;

    const response=await fetch(url,{
        headers:{
            "Accept":"application/json"
        }
    });

    const data=await response.json();

    results.innerHTML="";

    data.forEach(place=>{

        const div=document.createElement("div");

        div.className="result";

        div.innerHTML=`
        <strong>${place.display_name}</strong><br>
        Lat: ${place.lat}<br>
        Lon: ${place.lon}
        `;

        results.appendChild(div);

    });

}

function getCurrentLocation(){

    navigator.geolocation.getCurrentPosition(async(position)=>{

        const lat=position.coords.latitude;
        const lon=position.coords.longitude;

        const url=`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=jsonv2`;

        const response=await fetch(url);

        const data=await response.json();

        alert(data.display_name);

    },
    ()=>{
        alert("Location permission denied");
    });

}

</script>

</body>
</html>
